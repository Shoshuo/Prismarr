framework:
    default_locale: en
    enabled_locales: ['en', 'fr']
    translator:
        default_path: '%kernel.project_dir%/translations'
        # en is the source locale (Prismarr is a public homelab project, EN by default).
        # fr is the first translation. Other locales added later should list their
        # fallback here (e.g. ['es', 'en']).
        fallbacks: ['en']
