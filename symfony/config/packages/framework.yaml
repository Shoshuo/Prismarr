# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Reverse-proxy awareness (Traefik, nginx, Caddy external, Cloudflare Tunnel)
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers:
        - x-forwarded-for
        - x-forwarded-proto
        - x-forwarded-host
        - x-forwarded-port
        - x-forwarded-prefix

    # Persistent sessions in var/sessions (survive FrankenPHP restarts)
    # Dedicated cookie name to coexist with other apps on the same domain (e.g. Argos)
    session:
        handler_id: ~
        name: PRISMARR_SESSION
        cookie_secure: auto
        cookie_samesite: lax
        cookie_lifetime: 604800       # 7 days
        gc_maxlifetime: 604800        # 7 days of inactivity before expiration
        save_path: '%kernel.project_dir%/var/sessions'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
