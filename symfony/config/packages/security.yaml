security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                default_target_path: app_home
                # Ignore the URL Symfony saved when an expired session hit
                # an AJAX endpoint (e.g. /api/health/services, /qbittorrent/api/*).
                # After login we always land on /, which honors the user's
                # `display_home_page` preference.
                always_use_default_target_path: true
                enable_csrf: true
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 7 jours
                path: /

    access_control:
        # Exact health endpoint stays public for Docker healthcheck.
        # The /api/health/services snapshot needs auth (leaks service config).
        - { path: ^/api/health/services, roles: ROLE_USER }
        - { path: ^/api/health$, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/setup, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
