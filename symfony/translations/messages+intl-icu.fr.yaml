  step:
    welcome:
      title: Bienvenue sur Prismarr
      subtitle: 'Un dashboard unifié pour votre stack médias self-hosted. Quelques minutes suffisent pour tout configurer.'
      features:
        media: Films & Séries
        indexers: Indexeurs
        downloads: Téléchargements
        discovery: Découverte TMDb
      cta: 'Commencer la configuration →'
    admin:
      eyebrow: 'Étape 2 sur 7'
      title: Créez votre compte administrateur
      subtitle: 'Ce compte aura accès à toute la configuration de Prismarr. Vous pourrez créer d''autres utilisateurs plus tard depuis l''administration.'
      email: Adresse email
      display_name: Nom d'affichage
      display_name_optional: (optionnel)
      password: Mot de passe
      password_hint: (8 min.)
      password_confirm: Confirmation
      toggle_visibility: Afficher/masquer
      back: '← Précédent'
      cta: 'Créer le compte →'
    tmdb:
      eyebrow: 'Étape 3 sur 7 · Optionnel'
      title: The Movie Database (TMDb)
      subtitle: 'Nécessaire pour la page <strong>Découverte</strong> (films & séries tendance, recommandations, watchlist). Créez une clé gratuite sur <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">themoviedb.org</a>. Si vous passez cette étape, la Découverte sera désactivée.'
      api_key: Clé API v3
      api_key_hint: 'Version v3 uniquement — la v4 (token Bearer) n''est pas encore supportée.'
    managers:
      eyebrow: 'Étape 4 sur 7 · Optionnel'
      title: Gestionnaires médias
      subtitle: 'Radarr gère votre bibliothèque de films, Sonarr gère les séries. Vous pouvez configurer les deux, un seul, ou passer cette étape.'
      radarr:
        section: '🎬 Radarr — Films'
        subtitle: Service de gestion automatisée des films.
      sonarr:
        section: '📺 Sonarr — Séries'
        subtitle: Service de gestion automatisée des séries TV.
      fields:
        url: URL
        api_key: Clé API
    indexers:
      eyebrow: 'Étape 5 sur 7 · Optionnel'
      title: Indexeurs & requêtes
      subtitle: 'Prowlarr centralise vos indexeurs trackers. Jellyseerr permet aux utilisateurs de faire des demandes de films et séries qui sont ensuite envoyées à Radarr/Sonarr.'
      prowlarr:
        section: '🔎 Prowlarr — Indexeurs'
        subtitle: Agrégateur d'indexeurs compatible Radarr/Sonarr.
      jellyseerr:
        section: '🙋 Jellyseerr — Requêtes utilisateurs'
        subtitle: Interface de requêtes pour les utilisateurs finaux.
    downloads:
      eyebrow: 'Étape 6 sur 7 · Optionnel'
      title: Client de téléchargement
      subtitle: 'qBittorrent est votre client BitTorrent. Gluetun est un routeur VPN optionnel qui tourne devant qBittorrent pour masquer votre IP.'
      qbittorrent:
        section: '⬇️ qBittorrent'
        subtitle: Authentification via l'interface Web UI de qBittorrent.
        user: Utilisateur
        password: Mot de passe
      gluetun:
        section: 'Gluetun'
        section_suffix: 'VPN — optionnel'
        subtitle: 'Laissez vide si qBittorrent ne passe pas par un VPN.'
        url: URL (Control Server)
        protocol: Protocole
        protocol_auto: Auto
        api_key: Clé API
        api_key_optional: (optionnel)
        api_key_placeholder: 'Bearer token si le Control Server est protégé'
    finish:
      eyebrow: 'Étape 7 sur 7'
      title: 'Tout est prêt !'
      subtitle: 'Voici un récapitulatif de la configuration. Vous pourrez modifier ou ajouter des services à tout moment depuis l''administration.'
      badge_configured: Configuré
      badge_skipped: Ignoré
      cta: 'Lancer Prismarr →'
    common:
      back: '← Précédent'
      skip: Passer cette étape
      save_next: 'Enregistrer et continuer →'

